name: Self-Healing Monitor

on:
  schedule:
    - cron: '*/30 * * * *'  # Every 30 minutes
  workflow_dispatch: {}

jobs:
  health-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check backend health
        id: health
        continue-on-error: true
        run: |
          HTTP_CODE=$(curl -sf -o /dev/null -w "%{http_code}" \
            --max-time 10 \
            https://scanart-backend-603810013022.us-central1.run.app/health)
          echo "http_code=$HTTP_CODE" >> $GITHUB_OUTPUT
          if [ "$HTTP_CODE" != "200" ]; then
            echo "Health check failed: HTTP $HTTP_CODE"
            exit 1
          fi
          echo "Health check passed"

      - name: Check frontend health
        id: frontend
        continue-on-error: true
        run: |
          HTTP_CODE=$(curl -sf -o /dev/null -w "%{http_code}" \
            --max-time 10 \
            https://storage.googleapis.com/scanart-frontend-1772986018/index.html)
          echo "http_code=$HTTP_CODE" >> $GITHUB_OUTPUT
          if [ "$HTTP_CODE" != "200" ]; then
            echo "Frontend check failed: HTTP $HTTP_CODE"
            exit 1
          fi

      - name: Self-heal if backend down
        if: steps.health.outcome == 'failure'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Backend is DOWN. Attempting self-heal..."

          # Check Cloud Run logs for errors
          # Note: requires GCP auth — will only work if GCP_SA_KEY is set
          if [ -n "${{ secrets.GCP_SA_KEY }}" ]; then
            echo "${{ secrets.GCP_SA_KEY }}" > /tmp/gcp-key.json
            gcloud auth activate-service-account --key-file=/tmp/gcp-key.json 2>/dev/null || true
            LOGS=$(gcloud logging read "resource.type=cloud_run_revision AND resource.labels.service_name=scanart-backend AND severity>=ERROR" --limit=10 --format="value(textPayload)" 2>/dev/null || echo "Could not fetch logs")
            rm -f /tmp/gcp-key.json
          else
            LOGS="GCP credentials not available"
          fi

          # Create GitHub issue with diagnosis
          gh issue create \
            --title "ALERT: ScanArt backend health check failed" \
            --body "$(cat <<EOF
          ## Self-Healing Monitor Alert

          **Time:** $(date -u +"%Y-%m-%d %H:%M:%S UTC")
          **Backend HTTP:** ${{ steps.health.outputs.http_code }}
          **Frontend HTTP:** ${{ steps.frontend.outputs.http_code }}

          ### Recent Error Logs
          \`\`\`
          ${LOGS}
          \`\`\`

          ### Recommended Actions
          1. Check Cloud Run console for the service status
          2. Review recent deployments for breaking changes
          3. If OOM: increase memory via \`gcloud run deploy ... --memory=2Gi\`
          4. If cold start timeout: set min-instances via \`gcloud run deploy ... --min-instances=1\`

          ---
          Generated by ScanArt Self-Healing Monitor Agent
          EOF
          )" \
            --label "alert,auto"

          echo "GitHub issue created."
