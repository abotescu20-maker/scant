name: Viral Copy Optimizer Agent

on:
  schedule:
    - cron: '0 10 1,15 * *'  # 1st and 15th of each month at 10:00 UTC
  workflow_dispatch: {}

jobs:
  optimize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get referral analytics
        id: analytics
        run: |
          STATS=$(curl -sf "https://scanart-backend-603810013022.us-central1.run.app/api/admin/stats?key=${{ secrets.ADMIN_API_KEY }}&days=14")
          echo "stats<<EOF" >> $GITHUB_OUTPUT
          echo "$STATS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Run Copy Optimizer Agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          SHARE_PAGE=$(grep -A 100 'def _build_share_page' backend/app/api/generate.py | head -120)

          claude --print \
            "You are the ScanArt Viral Copy Optimizer — a Level 10 autonomous agent.

            ## Your mission
            Optimize the share page copy to increase referral conversion.

            ## Current analytics (last 14 days):
            ${{ steps.analytics.outputs.stats }}

            ## Current share page template:
            ${SHARE_PAGE}

            ## Rules
            1. Analyze the current copy (OG title, description, CTA text, challenge button text)
            2. Propose improved variants based on what drives higher conversion
            3. Keep all copy in ROMANIAN
            4. Focus on: urgency, social proof, curiosity, challenge framing
            5. Create branch: auto/copy-optimize-$(date +%Y%m%d)
            6. Edit ONLY the share page HTML template in generate.py
            7. Do NOT change any functional code — only text/copy strings
            8. Commit with clear message explaining the hypothesis

            ## Output
            - Current copy vs proposed copy (side by side)
            - Hypothesis: why the new copy should convert better
            - Branch name"

      - name: Create Pull Request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH=$(git branch --show-current)
          if [ "$BRANCH" != "main" ]; then
            git push -u origin "$BRANCH"
            gh pr create \
              --title "Auto: Share page copy optimization" \
              --body "$(cat <<'EOF'
          ## Viral Copy Optimizer Agent (Level 10)

          This PR proposes **optimized share page copy** to improve referral conversion.
          The agent analyzed 14 days of referral data and proposed improved text variants.

          **Action required:** Review the copy changes and merge if the hypothesis is sound.

          ---
          Generated by ScanArt Copy Optimizer Agent
          EOF
          )"
          fi
