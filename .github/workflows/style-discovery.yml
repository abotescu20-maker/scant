name: Style Discovery Agent

on:
  schedule:
    - cron: '0 10 * * 1'  # Every Monday at 10:00 UTC
  workflow_dispatch: {}

jobs:
  discover:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get analytics data
        id: analytics
        run: |
          STATS=$(curl -sf "https://scanart-backend-603810013022.us-central1.run.app/api/admin/stats?key=${{ secrets.ADMIN_API_KEY }}&days=30")
          echo "stats<<EOF" >> $GITHUB_OUTPUT
          echo "$STATS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Run Style Discovery Agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          CURRENT_STYLES=$(cat backend/app/models/schemas.py)

          claude --print \
            "You are the ScanArt Style Discovery Agent — an autonomous Level 10 agent.

            ## Your mission
            Analyze usage data and propose ONE new artistic style that fills an aesthetic gap.

            ## Current analytics (last 30 days):
            ${{ steps.analytics.outputs.stats }}

            ## Current styles:
            ${CURRENT_STYLES}

            ## Rules
            1. Pick a style that does NOT exist yet
            2. Target an underserved aesthetic niche (look for gaps in the style_breakdown)
            3. Write STYLE_INSTRUCTIONS using TECHNIQUE vocabulary, NOT iconic works
            4. Follow the scanart-style skill pattern exactly
            5. Create a new git branch: auto/new-style-<style_id>
            6. Modify all required files (schemas.py, gemini_service.py, index.html FILTERS + LOADING_MSGS)
            7. Do NOT bump sw.js or deploy — that happens after human review
            8. Commit your changes with a clear message

            ## Output
            After making changes, output a summary:
            - Style ID, label, emoji
            - Why this style fills a gap (based on analytics)
            - Files modified
            - Branch name"

      - name: Create Pull Request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH=$(git branch --show-current)
          if [ "$BRANCH" != "main" ]; then
            git push -u origin "$BRANCH"
            gh pr create \
              --title "Auto: New style suggestion from Discovery Agent" \
              --body "$(cat <<'EOF'
          ## Style Discovery Agent (Level 10)

          This style was **automatically proposed** by the autonomous Style Discovery Agent
          based on analytics data from the last 30 days.

          The agent analyzed style popularity, identified underserved aesthetic niches,
          and generated a complete style definition.

          **Action required:** Review the style definition and merge if approved.

          ---
          Generated by ScanArt Style Discovery Agent
          EOF
          )"
            echo "PR created successfully"
          else
            echo "No new branch created — agent may not have found a gap to fill"
          fi
