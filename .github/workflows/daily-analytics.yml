name: Daily Analytics Snapshot

on:
  schedule:
    - cron: '0 6 * * *'  # Daily at 06:00 UTC
  workflow_dispatch: {}

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - name: Save daily analytics snapshot
        run: |
          echo "Saving analytics snapshot..."
          RESULT=$(curl -sf -X POST \
            "https://scanart-backend-603810013022.us-central1.run.app/api/admin/snapshot?key=${{ secrets.ADMIN_API_KEY }}")
          echo "$RESULT" | python3 -m json.tool
          echo "Snapshot saved."
