<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login — Alex Insurance</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0f1117;
            color: #e8eaf6;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-box {
            width: 380px;
            background: #1a1d27;
            border: 1px solid #2d3250;
            border-radius: 14px;
            padding: 36px 32px;
        }
        .logo {
            text-align: center;
            margin-bottom: 28px;
        }
        .logo-icon { font-size: 40px; margin-bottom: 8px; }
        .logo-text {
            font-size: 22px;
            font-weight: 700;
            background: linear-gradient(135deg, #4f6ef7, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .logo-sub { font-size: 12px; color: #7b82a6; margin-top: 4px; }
        .form-group { margin-bottom: 16px; }
        label { display: block; font-size: 12px; color: #7b82a6; margin-bottom: 6px; font-weight: 500; }
        input {
            width: 100%;
            padding: 10px 14px;
            background: #22263a;
            border: 1px solid #2d3250;
            border-radius: 7px;
            color: #e8eaf6;
            font-size: 14px;
            outline: none;
            transition: border-color 0.15s;
        }
        input:focus { border-color: #4f6ef7; }
        .btn-login {
            width: 100%;
            padding: 11px;
            background: #4f6ef7;
            color: white;
            border: none;
            border-radius: 7px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 8px;
            transition: background 0.15s;
        }
        .btn-login:hover { background: #6b85ff; }
        .alert {
            padding: 10px 14px;
            border-radius: 7px;
            margin-bottom: 16px;
            font-size: 13px;
            background: rgba(224,92,92,0.1);
            border: 1px solid rgba(224,92,92,0.3);
            color: #f28a8a;
        }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 16px;
            font-size: 12px;
            color: #7b82a6;
            text-decoration: none;
        }
        .back-link:hover { color: #4f6ef7; }
    </style>
</head>
<body>
    <div class="login-box">
        <div class="logo">
            <div class="logo-icon">⚡</div>
            <div class="logo-text">Alex Admin</div>
            <div class="logo-sub">Insurance Broker Platform</div>
        </div>

        {% if error %}
        <div class="alert">{{ error }}</div>
        {% endif %}

        <form method="post" action="/admin/login">
            <div class="form-group">
                <label>Email address</label>
                <input type="email" name="email" placeholder="admin@company.com"
                       value="{{ email or '' }}" required autofocus>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn-login">Sign in</button>
        </form>

        <a href="/chat" class="back-link">← Back to chat</a>
    </div>
</body>
</html>
